<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - Day 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0f;
            color: #00ff88;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .header {
            margin-bottom: 30px;
        }

        .day-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            color: #ff006e;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ff006e;
            letter-spacing: 2px;
        }

        .game-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            margin-bottom: 20px;
            animation: glow 1.5s ease-in-out infinite alternate;
            letter-spacing: 3px;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            }
            to {
                text-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88, 0 0 80px #00ff88;
            }
        }

        .score-display {
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            color: #00d9ff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00d9ff;
            letter-spacing: 2px;
        }

        .game-board {
            background-color: #1a1a2e;
            border: 4px solid #00ff88;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            max-width: 400px;
            margin: 0 auto 30px;
            overflow: hidden;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(20, 1fr);
            width: 100%;
            height: 100%;
            gap: 0;
        }

        .grid-cell {
            aspect-ratio: 1;
            background-color: #0f1f3a;
            border: 0.5px solid #16213e;
            position: relative;
        }

        .grid-cell.snake {
            background-color: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .grid-cell.snake-head {
            background-color: #00ff88;
            box-shadow: 0 0 20px #00ff88, inset 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .grid-cell.food {
            background-color: #ff006e;
            box-shadow: 0 0 15px #ff006e;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from {
                box-shadow: 0 0 15px #ff006e;
            }
            to {
                box-shadow: 0 0 25px #ff006e;
            }
        }

        .controls {
            margin-bottom: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
        }

        .control-text {
            color: #00d9ff;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #00d9ff;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            padding: 12px 20px;
            border: 2px solid #00ff88;
            background-color: #0a0a0f;
            color: #00ff88;
            cursor: pointer;
            text-shadow: 0 0 5px #00ff88;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        button:hover {
            background-color: #00ff88;
            color: #0a0a0f;
            text-shadow: none;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
        }

        .game-over-modal.show {
            display: flex;
        }

        .modal-content {
            background-color: #1a1a2e;
            border: 4px solid #ff006e;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.4);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-content h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            color: #ff006e;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff006e;
            letter-spacing: 2px;
        }

        .modal-content p {
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            color: #00ff88;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00ff88;
        }

        .instructions {
            background-color: #0f1f3a;
            border: 2px solid #00d9ff;
            border-radius: 6px;
            padding: 15px;
            margin-top: 20px;
            font-size: 11px;
            text-align: left;
            color: #00d9ff;
            text-shadow: 0 0 5px #00d9ff;
            line-height: 1.8;
        }

        .instructions h3 {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            margin-bottom: 10px;
        }

        @media (max-width: 500px) {
            .game-title {
                font-size: 20px;
            }

            .day-label {
                font-size: 12px;
            }

            .score-display {
                font-size: 14px;
            }

            button {
                font-size: 10px;
                padding: 10px 15px;
            }

            .modal-content h2 {
                font-size: 18px;
            }

            .modal-content p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="day-label">▲ DAY 1 ▲</div>
            <div class="game-title">SNAKE</div>
        </div>

        <div class="score-display">SCORE: <span id="score">0</span></div>

        <div class="game-board">
            <div class="game-grid" id="gameGrid"></div>
        </div>

        <div class="controls">
            <div class="control-text">Use Arrow Keys or WASD to move</div>
        </div>

        <div class="button-group">
            <button id="startBtn" onclick="startGame()">START GAME</button>
            <button id="pauseBtn" onclick="togglePause()" disabled>PAUSE</button>
        </div>

        <div class="instructions">
            <h3>HOW TO PLAY:</h3>
            <div>• Move the snake with arrow keys or WASD</div>
            <div>• Eat the pink food to grow</div>
            <div>• Don't hit the walls or yourself</div>
            <div>• Get the highest score possible</div>
        </div>
    </div>

    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2>GAME OVER</h2>
            <p>FINAL SCORE: <span id="finalScore">0</span></p>
            <button onclick="playAgain()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 20;
        const CELL_SIZE = 20;
        
        let snake = [];
        let food = { x: 10, y: 10 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameOver = false;
        let gameLoopInterval = null;

        const gameGrid = document.getElementById('gameGrid');
        const scoreDisplay = document.getElementById('score');
        const finalScoreDisplay = document.getElementById('finalScore');
        const gameOverModal = document.getElementById('gameOverModal');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        // Initialize grid
        function initializeGrid() {
            gameGrid.innerHTML = '';
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.id = `cell-${i}`;
                gameGrid.appendChild(cell);
            }
        }

        function startGame() {
            if (gameRunning && !gameOver) return;
            
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameRunning = true;
            gamePaused = false;
            gameOver = false;
            gameOverModal.classList.remove('show');
            
            scoreDisplay.textContent = score;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            
            generateFood();
            render();
            
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(gameLoop, 100);
        }

        function gameLoop() {
            if (!gameRunning || gamePaused || gameOver) return;
            
            direction = nextDirection;
            
            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };
            
            // Check wall collision
            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                endGame();
                return;
            }
            
            // Check self collision
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                endGame();
                return;
            }
            
            snake.unshift(newHead);
            
            // Check food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                scoreDisplay.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }
            
            render();
        }

        function generateFood() {
            let newFood;
            let collision;
            
            do {
                collision = false;
                newFood = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                
                if (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y)) {
                    collision = true;
                }
            } while (collision);
            
            food = newFood;
        }

        function render() {
            // Clear all cells
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.getElementById(`cell-${i}`);
                cell.classList.remove('snake', 'snake-head', 'food');
            }
            
            // Draw snake
            snake.forEach((segment, index) => {
                const cellIndex = segment.y * GRID_SIZE + segment.x;
                const cell = document.getElementById(`cell-${cellIndex}`);
                if (index === 0) {
                    cell.classList.add('snake-head');
                } else {
                    cell.classList.add('snake');
                }
            });
            
            // Draw food
            const foodIndex = food.y * GRID_SIZE + food.x;
            const foodCell = document.getElementById(`cell-${foodIndex}`);
            foodCell.classList.add('food');
        }

        function endGame() {
            gameRunning = false;
            gameOver = true;
            clearInterval(gameLoopInterval);
            finalScoreDisplay.textContent = score;
            gameOverModal.classList.add('show');
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        function togglePause() {
            if (!gameRunning || gameOver) return;
            
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '
