<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4 - Neon Breakout | Daily Game Drop</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            margin-bottom: 10px;
        }
        
        .title {
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            color: #ff0088;
            text-shadow: 0 0 15px #ff0088;
            margin-bottom: 30px;
        }
        
        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .score {
            font-size: 18px;
            color: #00ffff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00ffff;
        }
        
        #gameCanvas {
            border: 2px solid #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            background: #111118;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 2px solid #ff0088;
            border-radius: 10px;
            display: none;
        }
        
        .game-over h2 {
            font-family: 'Press Start 2P', cursive;
            color: #ff0088;
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow: 0 0 15px #ff0088;
        }
        
        .game-over p {
            color: #00ffff;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .play-again-btn {
            background: linear-gradient(45deg, #ff0088, #00ff88);
            border: none;
            color: white;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .play-again-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 136, 0.5);
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .header {
                font-size: 18px;
            }
            
            .title {
                font-size: 14px;
            }
            
            #gameCanvas {
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>
    <div class="header">DAY 4</div>
    <div class="title">NEON BREAKOUT</div>
    
    <div class="game-container">
        <div class="score">SCORE: <span id="scoreValue">0</span></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="game-over" id="gameOver">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button class="play-again-btn" onclick="playAgain()">PLAY AGAIN</button>
        </div>
        
        <div class="controls">
            Use LEFT/RIGHT arrows or A/D to move paddle
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreValue');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        
        let gameState = {
            score: 0,
            lives: 3,
            gameRunning: false,
            animationId: null
        };
        
        let paddle = {
            x: canvas.width / 2 - 60,
            y: canvas.height - 30,
            width: 120,
            height: 15,
            speed: 8
        };
        
        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            dx: 4,
            dy: -4
        };
        
        let bricks = [];
        let keys = {};
        
        const brickRows = 5;
        const brickCols = 10;
        const brickWidth = 70;
        const brickHeight = 20;
        const brickPadding = 5;
        const brickOffsetTop = 60;
        const brickOffsetLeft = 35;
        
        const colors = ['#ff0088', '#ff8800', '#ffff00', '#00ff88', '#0088ff'];
        
        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickCols; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRows; r++) {
                    bricks[c][r] = {
                        x: c * (brickWidth + brickPadding) + brickOffsetLeft,
                        y: r * (brickHeight + brickPadding) + brickOffsetTop,
                        width: brickWidth,
                        height: brickHeight,
                        status: 1,
                        color: colors[r]
                    };
                }
            }
        }
        
        function drawBricks() {
            for (let c = 0; c < brickCols; c++) {
                for (let r = 0; r < brickRows; r++) {
                    if (bricks[c][r].status === 1) {
                        const brick = bricks[c][r];
                        ctx.fillStyle = brick.color;
                        ctx.shadowColor = brick.color;
                        ctx.shadowBlur = 10;
                        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                        ctx.shadowBlur = 0;
                    }
                }
            }
        }
        
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.closePath();
        }
        
        function drawPaddle() {
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 10;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowBlur = 0;
        }
        
        function drawScore() {
            ctx.fillStyle = '#00ffff';
            ctx.font = '16px Share Tech Mono';
            ctx.fillText('Lives: ' + gameState.lives, 20, 30);
        }
        
        function collisionDetection() {
            for (let c = 0; c < brickCols; c++) {
                for (let r = 0; r < brickRows; r++) {
                    const brick = bricks[c][r];
                    if (brick.status === 1) {
                        if (ball.x > brick.x && ball.x < brick.x + brick.width &&
                            ball.y > brick.y && ball.y < brick.y + brick.height) {
                            ball.dy = -ball.dy;
                            brick.status = 0;
                            gameState.score += (r + 1) * 10;
                            scoreElement.textContent = gameState.score;
                            
                            if (gameState.score === brickRows * brickCols * 10) {
                                alert('You Win!');
                                document.location.reload();
                            }
                        }
                    }
                }
            }
        }
        
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx = -ball.dx;
            }
            
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            } else if (ball.y + ball.radius > canvas.height) {
                gameState.lives--;
                if (gameState.lives > 0) {
                    ball.x = canvas.width / 2;
                    ball.y = canvas.height / 2;
                    ball.dx = 4;
                    ball.dy = -4;
                    paddle.x = canvas.width / 2 - paddle.width / 2;
                } else {
                    endGame();
                }
            }
            
            if (ball.x > paddle.x && ball.x < paddle.x + paddle.width &&
                ball.y + ball.radius > paddle.y && ball.y + ball.radius < paddle.y + paddle.height) {
                let hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = 8 * (hitPos - 0.5);
                ball.dy = -Math.abs(ball.dy);
            }
        }
        
        function updatePaddle() {
            if (keys['ArrowLeft'] || keys['a']) {
                paddle.x -= paddle.speed;
                if (paddle.x < 0) {
                    paddle.x = 0;
                }
            }
            
            if (keys['ArrowRight'] || keys['d']) {
                paddle.x += paddle.speed;
                if (paddle.x + paddle.width > canvas.width) {
                    paddle.x = canvas.width - paddle.width;
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBricks();
            drawBall();
            drawPaddle();
            drawScore();
            
            collisionDetection();
            updateBall();
            updatePaddle();
            
            if (gameState.gameRunning) {
                gameState.animationId = requestAnimationFrame(draw);
            }
        }
        
        function endGame() {
            gameState.gameRunning = false;
            cancelAnimationFrame(gameState.animationId);
            finalScoreElement.textContent = gameState.score;
            gameOverElement.style.display = 'block';
        }
        
        function resetGame() {
            gameState.score = 0;
            gameState.lives = 3;
            gameState.gameRunning = false;
            
            paddle.x = canvas.width / 2 - paddle.width / 2;
            paddle.y = canvas.height - 30;
            
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = 4;
            ball.dy = -4;
            
            initBricks();
            scoreElement.textContent = '0';
            gameOverElement.style.display = 'none';
            
            if (gameState.animationId) {
                cancelAnimationFrame(gameState.animationId);
            }
        }
        
        function startGame() {
            gameState.gameRunning = true;
            draw();
        }
        
        function playAgain() {
            resetGame();
            startGame();
        }
        
        document.addEventListener('keydown', function(e) {
            keys[e.key] = true;
        });
        
        document.addEventListener('keyup', function(e) {
            keys[e.key] = false;
        });
        
        let touchStartX = 0;
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
        });
        
        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const deltaX = touchX - touchStartX;
            
            paddle.x += deltaX * 0.5;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
            
            touchStartX = touchX;
        });
        
        resetGame();
        startGame();
    </script>
</body>
</html>
