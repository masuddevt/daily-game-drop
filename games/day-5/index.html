<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 5 - Typing Speed Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .day-counter {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #00ffff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffff;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            color: #ff00ff;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #ff00ff;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .stat-label {
            font-size: 12px;
            color: #00ffff;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }

        .text-container {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .text-to-type {
            font-size: 20px;
            line-height: 1.8;
            letter-spacing: 1px;
            max-width: 100%;
        }

        .char {
            position: relative;
        }

        .char.correct {
            background-color: rgba(0, 255, 0, 0.3);
            color: #00ff00;
        }

        .char.incorrect {
            background-color: rgba(255, 0, 0, 0.3);
            color: #ff0000;
        }

        .char.current {
            background-color: rgba(0, 255, 255, 0.3);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        .input-area {
            margin-bottom: 30px;
        }

        #typingInput {
            width: 100%;
            max-width: 600px;
            padding: 15px 20px;
            font-size: 18px;
            font-family: 'Share Tech Mono', monospace;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 10px;
            color: #ffffff;
            text-align: center;
            outline: none;
        }

        #typingInput:focus {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            font-family: 'Share Tech Mono', monospace;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            border-radius: 10px;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 30px rgba(255, 0, 255, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        .results h2 {
            font-family: 'Press Start 2P', cursive;
            color: #00ff00;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .result-item {
            background: rgba(0, 255, 0, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #00ff00;
        }

        .hidden {
            display: none;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #666;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 18px;
            }

            .text-to-type {
                font-size: 16px;
            }

            #typingInput {
                font-size: 16px;
            }

            .stats {
                gap: 15px;
            }

            .stat-item {
                padding: 10px 15px;
            }

            .text-container {
                padding: 20px;
                min-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="day-counter">DAY 5</div>
    
    <div class="game-container">
        <h1>TYPING SPEED TEST</h1>
        
        <div class="instructions">
            Type the text below as quickly and accurately as possible. Click "Start Test" to begin!
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">WPM</div>
                <div class="stat-value" id="wpmDisplay">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">ACCURACY</div>
                <div class="stat-value" id="accuracyDisplay">100%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="timeDisplay">60</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
        </div>

        <div class="text-container">
            <div class="text-to-type" id="textToType"></div>
        </div>

        <div class="input-area">
            <input type="text" id="typingInput" placeholder="Click 'Start Test' to begin typing..." disabled>
        </div>

        <div class="controls">
            <button onclick="startTest()">Start Test</button>
            <button onclick="resetTest()">Reset</button>
        </div>

        <div id="results" class="results hidden">
            <h2>TEST COMPLETE!</h2>
            <div class="result-stats">
                <div class="result-item">
                    <div class="stat-label">Final WPM</div>
                    <div class="stat-value" id="finalWpm">0</div>
                </div>
                <div class="result-item">
                    <div class="stat-label">Final Accuracy</div>
                    <div class="stat-value" id="finalAccuracy">100%</div>
                </div>
                <div class="result-item">
                    <div class="stat-label">Total Score</div>
                    <div class="stat-value" id="finalScore">0</div>
                </div>
                <div class="result-item">
                    <div class="stat-label">Characters Typed</div>
                    <div class="stat-value" id="finalChars">0</div>
                </div>
            </div>
            <button onclick="playAgain()">Play Again</button>
        </div>
    </div>

    <script>
        let gameState = {
            isActive: false,
            startTime: null,
            timeLimit: 60,
            currentIndex: 0,
            correctChars: 0,
            totalChars: 0,
            errors: 0,
            wpm: 0,
            accuracy: 100,
            score: 0,
            timer: null
        };

        const sampleTexts = [
            "The quick brown fox jumps over the lazy dog. This pangram contains every letter of the English alphabet at least once, making it a perfect sentence for typing practice and font testing.",
            "In a hole in the ground there lived a hobbit. Not a nasty, dirty, wet hole, filled with the ends of worms and an oozy smell, nor yet a dry, bare, sandy hole with nothing in it to sit down on or to eat.",
            "It was the best of times, it was the worst of times, it was the age of wisdom, it was the age of foolishness, it was the epoch of belief, it was the epoch of incredulity, it was the season of Light.",
            "To be or not to be, that is the question. Whether 'tis nobler in the mind to suffer the slings and arrows of outrageous fortune, or to take arms against a sea of troubles and by opposing end them.",
            "Space: the final frontier. These are the voyages of the starship Enterprise. Its continuing mission: to explore strange new worlds, to seek out new life and new civilizations, to boldly go where no one has gone before.",
            "All human beings are born free and equal in dignity and rights. They are endowed with reason and conscience and should act towards one another in a spirit of brotherhood and mutual understanding.",
            "The only way to do great work is to love what you do. If you haven't found it yet, keep looking. Don't settle. As with all matters of the heart, you'll know when you find it and your life will never be the same."
        ];

        let currentText = '';

        function initializeGame() {
            currentText = sampleTexts[Math.floor(Math.random() * sampleTexts.length)];
            displayText();
            resetStats();
        }

        function displayText() {
            const textContainer = document.getElementById('textToType');
            textContainer.innerHTML = '';
            
            for (let i = 0; i < currentText.length; i++) {
                const span = document.createElement('span');
                span.textContent = currentText[i];
                span.className = 'char';
                if (i === 0) {
                    span.classList.add('current');
                }
                textContainer.appendChild(span);
            }
        }

        function resetStats() {
            gameState.isActive = false;
            gameState.startTime = null;
            gameState.currentIndex = 0;
            gameState.correctChars = 0;
            gameState.totalChars = 0;
            gameState.errors = 0;
            gameState.wpm = 0;
            gameState.accuracy = 100;
            gameState.score = 0;

            updateDisplay();
            
            document.getElementById('timeDisplay').textContent = gameState.timeLimit;
            document.getElementById('results').classList.add('hidden');
            document.getElementById('typingInput').value = '';
            document.getElementById('typingInput').disabled = true;
            document.getElementById('typingInput').placeholder = "Click 'Start Test' to begin typing...";

            if (gameState.timer) {
                clearInterval(gameState.timer);
                gameState.timer = null;
            }
        }

        function updateDisplay() {
            document.getElementById('wpmDisplay').textContent = Math.round(gameState.wpm);
            document.getElementById('accuracyDisplay').textContent = Math.round(gameState.accuracy) + '%';
            document.getElementById('scoreDisplay').textContent = gameState.score;
        }

        function calculateStats() {
            if (!gameState.startTime) return;

            const timeElapsed = (Date.now() - gameState.startTime) / 1000 / 60; // in minutes
            const wordsTyped = gameState.correctChars / 5; // standard: 5 chars = 1 word
            gameState.wpm = timeElapsed > 0 ? wordsTyped / timeElapsed : 0;
            gameState.accuracy = gameState.totalChars > 0 ? (gameState.correctChars / gameState.totalChars) * 100 : 100;
            gameState.score = Math.round(gameState.wpm * (gameState.accuracy / 100) * 10);
        }

        function updateTimer() {
            if (!gameState.startTime) return;

            const timeElapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
            const timeRemaining = Math.max(0, gameState.timeLimit - timeElapsed);
            
            document.getElementById('timeDisplay').textContent = timeRemaining;
            
            if (timeRemaining <= 0) {
                endTest();
            }
        }

        function startTest() {
            if (gameState.isActive) return;

            gameState.isActive = true;
            gameState.startTime = Date.now();
            
            document.getElementById('typingInput').disabled = false;
            document.getElementById('typingInput').placeholder = "Start typing...";
            document.getElementById('typingInput').focus();
            
            gameState.timer = setInterval(function() {
                updateTimer();
                calculateStats();
                updateDisplay();
            }, 100);
        }

        function endTest() {
            gameState.isActive = false;
            
            if (gameState.timer) {
                clearInterval(gameState.timer);
                gameState.timer = null;
            }
            
            document.getElementById('typingInput').disabled = true;
            
            calculateStats();
            updateDisplay();
            showResults();
        }

        function showResults()
