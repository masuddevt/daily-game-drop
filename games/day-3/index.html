<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Game Drop - Day 3: Neon Whacker</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        .day-header {
            font-family: 'Press Start 2P', cursive;
            color: #00ffff;
            font-size: 16px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffff;
        }

        .game-title {
            font-family: 'Press Start 2P', cursive;
            color: #ff00ff;
            font-size: 24px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #ff00ff;
        }

        .game-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat {
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
        }

        .score {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .timer {
            color: #ffff00;
            text-shadow: 0 0 10px #ffff00;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            margin: 30px auto;
            max-width: 400px;
            aspect-ratio: 1;
        }

        .hole {
            background: #1a1a2e;
            border: 3px solid #16213e;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .hole:hover {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .mole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border-radius: 50%;
            animation: pop-up 0.3s ease-out;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
        }

        .mole:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .mole.hit {
            animation: hit 0.3s ease-out;
        }

        @keyframes pop-up {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @keyframes hit {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                background: #00ff00;
            }
            100% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
        }

        .start-btn, .play-again-btn {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            color: #0a0a0f;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .start-btn:hover, .play-again-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
        }

        .game-over {
            display: none;
            text-align: center;
        }

        .game-over h2 {
            font-family: 'Press Start 2P', cursive;
            color: #ff0040;
            font-size: 20px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff0040;
        }

        .final-score {
            font-size: 24px;
            color: #00ff00;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00ff00;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .game-title {
                font-size: 18px;
            }

            .day-header {
                font-size: 14px;
            }

            .stat {
                font-size: 16px;
            }

            .game-stats {
                gap: 20px;
            }

            .start-btn, .play-again-btn {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="day-header">DAY 3</div>
        <h1 class="game-title">NEON WHACKER</h1>
        
        <div id="gameStats" class="game-stats hidden">
            <div class="stat score">Score: <span id="scoreValue">0</span></div>
            <div class="stat timer">Time: <span id="timeValue">30</span>s</div>
        </div>

        <div id="gameBoard" class="game-board hidden">
            <div class="hole" data-hole="0"></div>
            <div class="hole" data-hole="1"></div>
            <div class="hole" data-hole="2"></div>
            <div class="hole" data-hole="3"></div>
            <div class="hole" data-hole="4"></div>
            <div class="hole" data-hole="5"></div>
            <div class="hole" data-hole="6"></div>
            <div class="hole" data-hole="7"></div>
            <div class="hole" data-hole="8"></div>
        </div>

        <button id="startBtn" class="start-btn" onclick="startGame()">START GAME</button>

        <div id="gameOver" class="game-over">
            <h2>GAME OVER</h2>
            <div class="final-score">Final Score: <span id="finalScore">0</span></div>
            <button class="play-again-btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let moleTimeout;
        let gameTimer;
        let currentMole = null;

        const holes = document.querySelectorAll('.hole');
        const scoreElement = document.getElementById('scoreValue');
        const timeElement = document.getElementById('timeValue');
        const startBtn = document.getElementById('startBtn');
        const gameStats = document.getElementById('gameStats');
        const gameBoard = document.getElementById('gameBoard');
        const gameOver = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');

        function startGame() {
            gameActive = true;
            score = 0;
            timeLeft = 30;
            
            startBtn.classList.add('hidden');
            gameStats.classList.remove('hidden');
            gameBoard.classList.remove('hidden');
            gameOver.style.display = 'none';
            
            updateDisplay();
            startTimer();
            spawnMole();
        }

        function resetGame() {
            gameActive = false;
            score = 0;
            timeLeft = 30;
            
            clearTimeout(moleTimeout);
            clearInterval(gameTimer);
            
            removeMoles();
            
            gameOver.style.display = 'none';
            startBtn.classList.remove('hidden');
            gameStats.classList.add('hidden');
            gameBoard.classList.add('hidden');
        }

        function updateDisplay() {
            scoreElement.textContent = score;
            timeElement.textContent = timeLeft;
        }

        function startTimer() {
            gameTimer = setInterval(function() {
                timeLeft--;
                updateDisplay();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearTimeout(moleTimeout);
            clearInterval(gameTimer);
            removeMoles();
            
            finalScoreElement.textContent = score;
            gameOver.style.display = 'block';
            gameStats.classList.add('hidden');
        }

        function spawnMole() {
            if (!gameActive) return;
            
            removeMoles();
            
            const randomHole = Math.floor(Math.random() * holes.length);
            const hole = holes[randomHole];
            
            const mole = document.createElement('div');
            mole.classList.add('mole');
            mole.onclick = hitMole;
            
            hole.appendChild(mole);
            currentMole = mole;
            
            const moleTime = Math.random() * 1500 + 800;
            
            moleTimeout = setTimeout(function() {
                if (mole.parentNode) {
                    mole.remove();
                }
                spawnMole();
            }, moleTime);
        }

        function hitMole(event) {
            if (!gameActive) return;
            
            event.stopPropagation();
            
            const mole = event.target;
            mole.classList.add('hit');
            mole.onclick = null;
            
            score += 10;
            updateDisplay();
            
            setTimeout(function() {
                if (mole.parentNode) {
                    mole.remove();
                }
            }, 300);
            
            clearTimeout(moleTimeout);
            setTimeout(spawnMole, 400);
        }

        function removeMoles() {
            holes.forEach(function(hole) {
                const mole = hole.querySelector('.mole');
                if (mole) {
                    mole.remove();
                }
            });
            currentMole = null;
        }
    </script>
</body>
</html>
