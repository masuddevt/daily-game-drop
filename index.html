<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Game Drop 🎮</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #12121a;
      --border: #2a2a3a;
      --neon-green: #00ff88;
      --neon-pink: #ff0077;
      --neon-blue: #00cfff;
      --neon-yellow: #ffe600;
      --text: #e0e0f0;
      --muted: #666688;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,207,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,207,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    header {
      padding: 60px 0 40px;
      text-align: center;
      position: relative;
    }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(18px, 4vw, 34px);
      color: var(--neon-green);
      text-shadow:
        0 0 10px var(--neon-green),
        0 0 40px rgba(0,255,136,0.4);
      letter-spacing: 2px;
      animation: flicker 6s infinite;
      line-height: 1.5;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.7; }
      97% { opacity: 1; }
      98% { opacity: 0.5; }
      99% { opacity: 1; }
    }

    .subtitle {
      margin-top: 18px;
      color: var(--neon-blue);
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 8px var(--neon-blue);
    }

    .streak-bar {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      background: var(--panel);
      border: 1px solid var(--neon-yellow);
      padding: 10px 22px;
      font-size: 12px;
      color: var(--neon-yellow);
      text-shadow: 0 0 8px var(--neon-yellow);
      box-shadow: 0 0 20px rgba(255,230,0,0.1);
    }

    .streak-dot {
      width: 8px; height: 8px;
      background: var(--neon-yellow);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--neon-yellow);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.6; }
    }

    /* STATS ROW */
    .stats {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 40px 0;
    }

    .stat-box {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 20px 32px;
      text-align: center;
      min-width: 140px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .stat-box:hover {
      border-color: var(--neon-pink);
      box-shadow: 0 0 20px rgba(255,0,119,0.15);
    }

    .stat-num {
      font-family: 'Press Start 2P', monospace;
      font-size: 28px;
      color: var(--neon-pink);
      text-shadow: 0 0 12px var(--neon-pink);
    }

    .stat-label {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* SECTION TITLE */
    .section-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* GAMES GRID */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .game-card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .game-card:hover {
      transform: translateY(-4px);
      border-color: var(--neon-blue);
      box-shadow: 0 8px 30px rgba(0,207,255,0.15);
    }

    .game-card:hover::before { transform: scaleX(1); }

    .card-day {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--neon-blue);
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .card-title {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 8px;
      font-family: 'Share Tech Mono', monospace;
    }

    .card-date {
      font-size: 11px;
      color: var(--muted);
    }

    .card-badge {
      position: absolute;
      top: 16px; right: 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      background: var(--neon-green);
      color: #000;
      padding: 4px 8px;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }

    .empty-state p {
      font-size: 13px;
      line-height: 2;
      max-width: 400px;
      margin: 0 auto;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 30px 0;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    footer span {
      color: var(--neon-green);
      text-shadow: 0 0 6px var(--neon-green);
    }

    /* LATEST BADGE ANIMATION */
    .latest .game-card {
      border-color: rgba(0,255,136,0.3);
    }

    @media (max-width: 600px) {
      .stats { gap: 10px; }
      .stat-box { padding: 16px 20px; min-width: 110px; }
      .stat-num { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">DAILY GAME DROP</div>
      <div class="subtitle">A new game. Every single day.</div>
      <div class="streak-bar">
        <div class="streak-dot"></div>
        AUTO-GENERATING SINCE DAY 1 &nbsp;·&nbsp; POWERED BY CLAUDE AI
      </div>
    </header>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-num" id="total-games">0</div>
        <div class="stat-label">Games Built</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="days-running">0</div>
        <div class="stat-label">Days Running</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">∞</div>
        <div class="stat-label">Days to Go</div>
      </div>
    </div>

    <div id="games-section">
      <div class="section-title">ALL GAMES</div>
      <div class="games-grid" id="games-grid">
        <!-- Games are injected here by games.json -->
      </div>
    </div>

    <footer>
      BUILT BY <span>CLAUDE AI</span> · RUNS ON GITHUB ACTIONS · ZERO HUMAN EFFORT AFTER DAY 1
    </footer>
  </div>

  <script>
    // Load games from games.json (updated automatically each day)
    fetch('games.json')
      .then(r => r.json())
      .then(games => {
        const grid = document.getElementById('games-grid');
        const total = games.length;

        document.getElementById('total-games').textContent = total;
        document.getElementById('days-running').textContent = total;

        if (total === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <span class="empty-icon">🎮</span>
              <p>No games yet! The first game will appear tomorrow after the GitHub Action runs for the first time.</p>
            </div>`;
          return;
        }

        // Sort newest first
        const sorted = [...games].reverse();

        sorted.forEach((game, i) => {
          const card = document.createElement('a');
          card.className = 'game-card' + (i === 0 ? ' latest' : '');
          card.href = `games/day-${game.day}/index.html`;
          card.innerHTML = `
            ${i === 0 ? '<div class="card-badge">NEW</div>' : ''}
            <div class="card-day">DAY ${game.day}</div>
            <div class="card-title">${game.title}</div>
            <div class="card-date">${game.date}</div>
          `;
          grid.appendChild(card);
        });
      })
      .catch(() => {
        document.getElementById('games-grid').innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <span class="empty-icon">🎮</span>
            <p>Getting ready... First game drops soon!</p>
          </div>`;
      });
  </script>
</body>
</html>
